# Ansible Configuration for T7910 Lab
# Contains global settings for playbook execution

[defaults]
# ============================================================================
# INVENTORY & PATHS
# ============================================================================
inventory = inventory/hosts.yml
roles_path = ./roles
library = ./library
module_utils = ./module_utils
filter_plugins = ./filter_plugins

# ============================================================================
# CONNECTION SETTINGS
# ============================================================================
host_key_checking = False
gather_subset = all,!facter,!ohai
gather_timeout = 30

# ============================================================================
# EXECUTION SETTINGS
# ============================================================================
forks = 5                           # Parallel execution limit
timeout = 300                       # Command timeout in seconds
retries = 3                         # Retry failed tasks
retry_files_enabled = True
retry_files_save_path = ./retry_files

# ============================================================================
# PRIVILEGE ESCALATION
# ============================================================================
become = False
become_method = sudo
become_user = root
become_ask_pass = False

# ============================================================================
# OUTPUT & VERBOSITY
# ============================================================================
display_skipped_hosts = False
display_ok_hosts = True
error_on_undefined_vars = True
jinja2_extensions = jinja2.ext.do
system_warnings = True
deprecation_warnings = True
action_warnings = True
stdout_callback = yaml
callback_whitelist = profile_tasks, timer, html

# ============================================================================
# LOGGING
# ============================================================================
log_path = /var/log/ansible/ansible.log

# ============================================================================
# VARIABLES & FACTS
# ============================================================================
inject_facts_as_vars = True
facts_modules = script, setup
allow_world_readable_tmpfiles = False
var_compression_level = 9

# ============================================================================
# MODULES & PLUGINS
# ============================================================================
module_compression = gz
plugin_filters_enabled = True
vault_password_file = ./vault-password-file

# ============================================================================
# SSH CONNECTION SETTINGS
# ============================================================================
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
scp_if_ssh = True

# ============================================================================
# PARAMIKO CONNECTION SETTINGS (fallback)
# ============================================================================
[paramiko_connection]
host_key_auto_add = True
look_for_keys = True
allow_agent = True

# ============================================================================
# PRIVILEGE ESCALATION
# ============================================================================
[privilege_escalation]
become_on_localhost = False

# ============================================================================
# JINJA2 EXTENSIONS
# ============================================================================
[jinja2]
# Custom Jinja2 settings (if needed)

# ============================================================================
# COLOR CONFIGURATION
# ============================================================================
[colors]
changed = cyan
command = white
depreciations = purple
diff_add = green
diff_lines = cyan
diff_remove = red
error = red
debug = dark gray
highlight = white
ok = green
skip = cyan
unreachable = red
verbose = blue
warn = bright purple
