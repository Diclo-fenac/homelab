# roles/security/tasks/main.yml
---
- name: "Configure UFW default policies"
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: yes

- name: "Allow SSH through UFW"
  ufw:
    rule: allow
    port: 22
    proto: tcp
  become: yes

- name: "Allow custom ports from hostvars"
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ ufw_rules | default([]) }}"
  become: yes
  when: ufw_rules is defined

- name: "Ensure Fail2ban is running"
  systemd:
    name: fail2ban
    state: started
    enabled: yes
  become: yes
