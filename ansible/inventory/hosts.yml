# Ansible Inventory for T7910 Lab
# This file defines all hosts, groups, and their connection details

all:
  vars:
    # Global variables accessible to all hosts
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3

  children:
    # ============================================================================
    # PROXMOX MANAGEMENT
    # ============================================================================
    proxmox:
      description: "Proxmox hypervisor nodes"
      hosts:
        t7910:
          ansible_host: 192.168.1.100  # T7910 IP address (adjust to your network)
          ansible_connection: local     # Local connection for Proxmox API calls
          proxmox_node: t7910           # Proxmox node name
          proxmox_api_host: 192.168.1.100
          proxmox_api_user: root@pam    # Or your Proxmox user
          proxmox_api_token_id: "ansible-token"  # API token ID (create in Proxmox UI)
          proxmox_api_token_secret: "{{ vault_proxmox_api_token }}"  # From vault
          proxmox_verify_ssl: false     # Set to true if you have valid certs

    # ============================================================================
    # SERIES 1: GATEWAY (LXC)
    # ============================================================================
    series_1_gateway:
      description: "Gateway LXC - Nginx reverse proxy + Tailscale + DNS"
      hosts:
        gateway:
          ansible_host: 192.168.1.101
          container_id: 101
          container_type: lxc
          container_hostname: gateway
          container_ostype: debian
          container_osversion: 12
          container_memory: 2048
          container_cores: 2
          container_storage: local-lvm
          container_rootfs_size: 20G
          # Gateway-specific roles
          gateway_nginx_enabled: true
          gateway_tailscale_enabled: true
          gateway_dns_enabled: true
          dns_upstream: 1.1.1.1        # Cloudflare DNS
          tailscale_auth_key: "{{ vault_tailscale_auth_key }}"

    # ============================================================================
    # SERIES 2: OBSERVABILITY (LXC)
    # ============================================================================
    series_2_observability:
      description: "Observability LXC - Prometheus + Grafana + Beszel"
      hosts:
        observability:
          ansible_host: 192.168.1.102
          container_id: 102
          container_type: lxc
          container_hostname: observability
          container_ostype: debian
          container_osversion: 12
          container_memory: 4096
          container_cores: 4
          container_storage: local-lvm
          container_rootfs_size: 50G
          # Observability-specific variables
          prometheus_enabled: true
          prometheus_retention: 30d
          beszel_enabled: true
          grafana_enabled: true
          grafana_admin_password: "{{ vault_grafana_password }}"
          loki_enabled: false            # Optional log aggregation

    # ============================================================================
    # SERIES 3: PLATFORM VM (Docker Host)
    # ============================================================================
    series_3_platform:
      description: "Platform VM - Docker host for Immich, Nextcloud, Plane, Dashy"
      hosts:
        platform-vm:
          ansible_host: 192.168.1.103
          vm_id: 200
          vm_type: vm
          vm_hostname: platform-vm
          vm_ostype: l26                # Linux 6.x kernel
          vm_memory: 16384              # 16GB
          vm_cores: 8
          vm_sockets: 2
          vm_storage: local-lvm
          vm_rootfs_size: 100G
          vm_additional_storage: true
          vm_storage_pool: local-lvm
          vm_additional_disk_size: 500G # For media/data
          # Docker host variables
          docker_enabled: true
          docker_compose_version: latest
          # Services to deploy
          immich_enabled: true
          immich_upload_dir: /data/immich
          nextcloud_enabled: true
          nextcloud_data_dir: /data/nextcloud
          plane_enabled: true
          dashy_enabled: true
          # Authentik (SSO) deployment
          authentik_enabled: true
          authentik_password: "{{ vault_authentik_password }}"

    # ============================================================================
    # SERIES 4: AI/STAGING VM
    # ============================================================================
    series_4_ai:
      description: "AI/Staging VM - 16vCPU + GPU for Ollama and dev work"
      hosts:
        ai-vm:
          ansible_host: 192.168.1.104
          vm_id: 201
          vm_type: vm
          vm_hostname: ai-vm
          vm_ostype: l26
          vm_memory: 32768              # 32GB RAM for LLMs
          vm_cores: 16
          vm_sockets: 2
          vm_storage: local-lvm
          vm_rootfs_size: 100G
          # GPU passthrough (adjust to your GPU)
          gpu_passthrough_enabled: true
          gpu_device: "0000:1a:00.0"    # PCIe address of your GPU (find with lspci)
          # AI workstation variables
          ollama_enabled: true
          ollama_models:
            - mistral
            - neural-chat
          cuda_enabled: true
          dev_tools_enabled: true

    # ============================================================================
    # MANAGEMENT LXC (Ansible Control Node)
    # ============================================================================
    management:
      description: "Management LXC - Ansible control node + Git repo storage"
      hosts:
        management:
          ansible_host: 192.168.1.105
          container_id: 105
          container_type: lxc
          container_hostname: management
          container_ostype: debian
          container_osversion: 12
          container_memory: 2048
          container_cores: 2
          container_storage: local-lvm
          container_rootfs_size: 30G
          # Management-specific variables
          ansible_control_node: true
          git_repo_storage: /opt/ansible-lab

    # ============================================================================
    # HOST GROUPINGS FOR TARGETING
    # ============================================================================
    lxc_containers:
      description: "All LXC containers"
      children:
        - series_1_gateway
        - series_2_observability
        - management

    vms:
      description: "All virtual machines"
      children:
        - series_3_platform
        - series_4_ai

    always_on:
      description: "Always-on infrastructure (LXCs)"
      children:
        - lxc_containers

    compute_intensive:
      description: "Compute-intensive workloads (VMs)"
      children:
        - vms

    # ============================================================================
    # DEPLOYMENT PHASES (for sequential deployment)
    # ============================================================================
    phase_0_prerequisites:
      description: "Phase 0: Proxmox API validation"
      hosts:
        - t7910

    phase_1_gateway:
      description: "Phase 1: Deploy Gateway LXC"
      hosts:
        - gateway

    phase_2_observability:
      description: "Phase 2: Deploy Observability LXC"
      hosts:
        - observability

    phase_3_platform:
      description: "Phase 3: Deploy Platform VM"
      hosts:
        - platform-vm

    phase_4_ai:
      description: "Phase 4: Deploy AI/Staging VM"
      hosts:
        - ai-vm

    phase_5_management:
      description: "Phase 5: Deploy Management LXC"
      hosts:
        - management

    # ============================================================================
    # SERVICE GROUPS (for service-specific plays)
    # ============================================================================
    nginx_reverse_proxy:
      hosts:
        - gateway

    monitoring:
      hosts:
        - observability

    docker_hosts:
      hosts:
        - platform-vm

    ai_workstations:
      hosts:
        - ai-vm

    sso_providers:
      hosts:
        - platform-vm

    security:
      hosts:
        - gateway
        - observability
        - platform-vm
        - ai-vm
