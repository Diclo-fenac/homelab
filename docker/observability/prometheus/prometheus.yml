global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      # Scrape the local node exporter (which includes the textfile collector from our backup script)
      - targets: ["node-exporter:9100"]

  # You can add Proxmox / PBS here later
  # - job_name: "proxmox"
  #   metrics_path: /pve
  #   ...
